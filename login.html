<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="description" content="Login to PTARKMAL Library Management System"><title>Login | PTARKMAL</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/style.css" rel="stylesheet"></head><body onload="initPublicNav(); renderNav(); renderFooter();"><div id="navMount"></div><main class="page-wrap"><div class="container login-shell"><div class="glass-card login-panel row g-0"><div class="col-lg-5 login-art"><h1 class="fw-black">Welcome to PTARKMAL</h1><p class="lead">Access the library dashboard using demo roles.</p><div class="bg-white bg-opacity-25 rounded-4 p-3"><p class="mb-1"><strong>Admin:</strong> admin / 1234</p><p class="mb-0"><strong>User:</strong> student / 1234</p></div></div><div class="col-lg-7 p-4 p-md-5"><h2 class="fw-bold mb-1">Login</h2><p class="text-muted">Enter your username and password.</p><div id="alertBox"></div><form id="loginForm" class="mt-4"><div class="mb-3"><label class="form-label fw-bold">Username</label><input class="form-control" id="username" autocomplete="username" placeholder="admin or student" required></div><div class="mb-3"><label class="form-label fw-bold">Password</label><input type="password" class="form-control" id="password" autocomplete="current-password" placeholder="1234" required></div><button class="btn btn-gradient w-100" type="submit">Login</button></form></div></div></div></main><div id="footerMount"></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/data.js"></script><script src="assets/js/app.js"></script><script>document.getElementById('loginForm').addEventListener('submit',e=>{e.preventDefault();const u=username.value.trim();const p=password.value.trim();const match=Object.values(PTARKMAL.credentials).find(x=>x.username===u&&x.password===p);if(match){setSession({username:match.username,role:match.role,name:match.name});location.href='dashboard.html';}else{alertBox.innerHTML='<div class="alert alert-danger rounded-4 fw-bold">Invalid username or password. Please try again.</div>';}});</script></body></html>
